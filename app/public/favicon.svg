<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="chipGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F0FF"/>
      <stop offset="50%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#FF006E"/>
    </linearGradient>
    <linearGradient id="innerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#12121A"/>
      <stop offset="100%" stop-color="#1A1A2E"/>
    </linearGradient>
  </defs>
  <!-- Outer chip shape — octagon -->
  <polygon points="20,2 44,2 62,20 62,44 44,62 20,62 2,44 2,20"
           fill="none" stroke="url(#chipGrad)" stroke-width="3" filter="url(#glow)"/>
  <!-- Inner dark fill -->
  <polygon points="20,6 44,6 58,20 58,44 44,58 20,58 6,44 6,20"
           fill="url(#innerGrad)"/>
  <!-- Inner chip ring -->
  <circle cx="32" cy="32" r="18" fill="none" stroke="url(#chipGrad)" stroke-width="1.5" opacity="0.5"/>
  <!-- CC monogram -->
  <text x="32" y="38" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="20" font-weight="800" fill="url(#chipGrad)" filter="url(#glow)">CC</text>
  <!-- Corner accents -->
  <circle cx="20" cy="20" r="2" fill="#00F0FF" opacity="0.6"/>
  <circle cx="44" cy="20" r="2" fill="#A855F7" opacity="0.6"/>
  <circle cx="44" cy="44" r="2" fill="#FF006E" opacity="0.6"/>
  <circle cx="20" cy="44" r="2" fill="#00FF88" opacity="0.6"/>
</svg>
