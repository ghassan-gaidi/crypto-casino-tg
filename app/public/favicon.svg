<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#08080E"/>
      <stop offset="100%" stop-color="#101018"/>
    </linearGradient>
  </defs>

  <!-- Background chip shape — octagon -->
  <polygon points="20,2 44,2 62,20 62,44 44,62 20,62 2,44 2,20"
           fill="none" stroke="#DC2626" stroke-width="2.5" filter="url(#glow)"/>
  <polygon points="20,5 44,5 59,20 59,44 44,59 20,59 5,44 5,20"
           fill="url(#bgGrad)"/>

  <!-- P pickaxe monogram -->
  <path d="
    M 32 46
    L 32 20
    L 24 14
    L 24 12
    L 32 18
    L 40 12
    L 40 14
    L 32 20
    L 32 26
    L 44 26
    Q 48 26 48 32
    Q 48 38 44 38
    L 32 38
  " fill="none" stroke="#DC2626" stroke-width="3.5" stroke-linecap="square" stroke-linejoin="miter" filter="url(#glow)"/>

  <!-- Corner accents -->
  <circle cx="20" cy="20" r="1.5" fill="#DC2626" opacity="0.5"/>
  <circle cx="44" cy="20" r="1.5" fill="#DC2626" opacity="0.5"/>
  <circle cx="44" cy="44" r="1.5" fill="#DC2626" opacity="0.5"/>
  <circle cx="20" cy="44" r="1.5" fill="#DC2626" opacity="0.5"/>
</svg>
