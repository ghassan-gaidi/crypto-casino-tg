<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#DC2626" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#08080E" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="64" fill="#08080E"/>
  <rect width="512" height="512" rx="64" fill="url(#bgGrad)"/>

  <!-- Outer ring — octagon chip shape -->
  <polygon points="160,32 352,32 480,160 480,352 352,480 160,480 32,352 32,160"
           fill="none" stroke="#DC2626" stroke-width="4" opacity="0.15"/>

  <!-- Inner ring -->
  <circle cx="256" cy="256" r="170" fill="none" stroke="#DC2626" stroke-width="1" opacity="0.08"/>

  <!-- PICKAXE MONOGRAM "P" -->
  <!-- The vertical stem of the P extends into a pickaxe head at top -->
  <g transform="translate(256,256)" filter="url(#glow)">
    <path d="
      M -2 170
      L -2 40
      L -50 -10
      L -50 -30
      L -2 10
      L 35 -30
      L 35 -10
      L -2 40
      L -2 70
      L 85 70
      Q 120 70 120 105
      Q 120 140 85 140
      L -2 140
    " fill="none" stroke="#DC2626" stroke-width="20" stroke-linecap="square" stroke-linejoin="miter"/>
  </g>

  <!-- PICKR wordmark -->
  <text x="256" y="420" text-anchor="middle" font-family="'Space Grotesk','system-ui',sans-serif" font-size="36" font-weight="700" letter-spacing="10" fill="#DC2626" opacity="0.7">PICKR</text>

  <!-- Subtle scanlines -->
  <g opacity="0.02">
    <line x1="0" y1="0" x2="512" y2="0" stroke="white" stroke-width="2"/>
    <line x1="0" y1="4" x2="512" y2="4" stroke="white" stroke-width="2"/>
    <line x1="0" y1="8" x2="512" y2="8" stroke="white" stroke-width="2"/>
    <line x1="0" y1="12" x2="512" y2="12" stroke="white" stroke-width="2"/>
    <line x1="0" y1="16" x2="512" y2="16" stroke="white" stroke-width="2"/>
  </g>
</svg>
