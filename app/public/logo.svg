<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F0FF"/>
      <stop offset="50%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#FF006E"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0A0F"/>
      <stop offset="100%" stop-color="#12121A"/>
    </linearGradient>
    <radialGradient id="radGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00F0FF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0A0A0F" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="64" fill="url(#bgGrad)"/>
  <rect width="512" height="512" rx="64" fill="url(#radGlow)"/>

  <!-- Outer chip — octagon -->
  <polygon points="160,32 352,32 480,160 480,352 352,480 160,480 32,352 32,160"
           fill="none" stroke="url(#grad)" stroke-width="6" filter="url(#glow)"/>

  <!-- Inner fill -->
  <polygon points="160,56 352,56 456,160 456,352 352,456 160,456 56,352 56,160"
           fill="#12121A" opacity="0.9"/>

  <!-- Inner ring -->
  <circle cx="256" cy="256" r="140" fill="none" stroke="url(#grad)" stroke-width="3" opacity="0.3"/>
  <circle cx="256" cy="256" r="120" fill="none" stroke="url(#grad)" stroke-width="1" opacity="0.15"/>

  <!-- CC monogram -->
  <text x="256" y="280" text-anchor="middle" font-family="'JetBrains Mono','Fira Code',monospace" font-size="120" font-weight="800" fill="url(#grad)" filter="url(#glowStrong)">CC</text>

  <!-- Corner chips -->
  <circle cx="160" cy="160" r="8" fill="#00F0FF" opacity="0.5" filter="url(#glow)"/>
  <circle cx="352" cy="160" r="8" fill="#A855F7" opacity="0.5" filter="url(#glow)"/>
  <circle cx="352" cy="352" r="8" fill="#FF006E" opacity="0.5" filter="url(#glow)"/>
  <circle cx="160" cy="352" r="8" fill="#00FF88" opacity="0.5" filter="url(#glow)"/>

  <!-- Subtle scanlines -->
  <g opacity="0.03">
    <rect x="0" y="0" width="512" height="2" fill="white"/>
    <rect x="0" y="4" width="512" height="2" fill="white"/>
    <rect x="0" y="8" width="512" height="2" fill="white"/>
    <rect x="0" y="12" width="512" height="2" fill="white"/>
    <rect x="0" y="16" width="512" height="2" fill="white"/>
    <rect x="0" y="20" width="512" height="2" fill="white"/>
  </g>
</svg>
